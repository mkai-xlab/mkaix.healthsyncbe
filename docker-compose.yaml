name: capstone

services:
  mysql:
    image: dhi.io/mysql:9
    container_name: capstone-mysql
    restart: unless-stopped
    env_file:
      - ../env/database.env
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  maildev:
    image: maildev/maildev:2.1.0
    container_name: capstone-maildev
    restart: unless-stopped
    ports:
      - "1080:1080" # Web UI
      - "1025:1025" # SMTP Port

  be:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capstone-be
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ../env/be.env
    depends_on:
      mysql:
        condition: service_healthy
      maildev:
        condition: service_started

volumes:
  mysql_data:

