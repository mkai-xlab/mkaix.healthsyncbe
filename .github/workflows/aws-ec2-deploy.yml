name: Remote EC2 Access via EIC Endpoint

on:
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Configure SSH Client
        run: |
          mkdir -p ~/.ssh
          cat <<EOF >> ~/.ssh/config
          Host *
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
          EOF

      - name: Run Remote Command via EC2 Instance Connect
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          INSTANCE_USER: ubuntu
        run: |
          # AWS CLI will automatically generate a temporary SSH key pair,
          # push the public key to EC2, and establish the SSH connection
          # via the EIC Endpoint. No static SSH private key is required in secrets.
          echo "cd capstone/mkaix.healthsyncbe/ && git pull && docker compose up -d --build" | aws ec2-instance-connect ssh \
            --instance-id $INSTANCE_ID \
            --os-user $INSTANCE_USER \
            --connection-type eice
