name: Build and Test

on:
    push:
        branches:
            - "feature/**"
    pull_request:
        branches:
            - "dev"

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql:9
                env:
                    MYSQL_ROOT_PASSWORD: capstone_root_password
                    MYSQL_DATABASE: capstone
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: "21"
                  distribution: "temurin"
                  cache: "maven"

            - name: Build and Test with Maven
              run: mvn clean package
