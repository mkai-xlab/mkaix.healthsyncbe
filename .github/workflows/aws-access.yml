name: Remote EC2 Access via EIC Endpoint

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

permissions:
  id-token: write # Required for requesting the JWT OIDC token
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Run Remote Command via EC2 Instance Connect
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          INSTANCE_USER: ubuntu
        run: |
          # AWS CLI will automatically generate a temporary SSH key pair,
          # push the public key to EC2, and establish the SSH connection
          # via the EIC Endpoint. No static SSH private key is required in secrets.
          echo "echo 'Connected successfully!' && uname -a" | aws ec2-instance-connect ssh \
            --instance-id $INSTANCE_ID \
            --os-user $INSTANCE_USER \
            --connection-type eice
